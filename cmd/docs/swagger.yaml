definitions:
  models.CreateAccountRequest:
    properties:
      document_number:
        type: string
    required:
    - document_number
    type: object
  models.ErrResponse:
    properties:
      error:
        $ref: '#/definitions/models.ErrorBody'
      status:
        example: false
        type: boolean
    type: object
  models.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  models.SuccessResponse:
    properties:
      data: {}
      message:
        example: account created
        type: string
      status:
        type: boolean
    type: object
  service.Account:
    properties:
      accountID:
        type: integer
      createdAt:
        type: string
      documentNumber:
        type: string
    type: object
info:
  contact: {}
paths:
  /accounts:
    post:
      consumes:
      - application/json
      description: Creates a new account with a document number
      parameters:
      - description: Account input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/service.Account'
              type: object
        "400":
          description: BAD_REQUEST
          schema:
            $ref: '#/definitions/models.ErrResponse'
        "409":
          description: ACCOUNT_ALREADY_EXISTS
          schema:
            $ref: '#/definitions/models.ErrResponse'
        "500":
          description: INTERNAL_ERROR
          schema:
            $ref: '#/definitions/models.ErrResponse'
      summary: Create account
      tags:
      - accounts
swagger: "2.0"
