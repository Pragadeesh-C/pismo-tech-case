services:
  api:
    build: .
    container_name: pismo-api
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/pismo?sslmode=disable
      - LOG_LEVEL=debug
    networks:
      - pismo-network
    
  db:
    image: postgres:18-alpine
    container_name: "pismo-db"
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pismo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 1s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pismo-network

volumes:
  postgres_data:

networks:
  pismo-network:
    driver: bridge