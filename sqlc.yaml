version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_prepared_queries: true
        emit_sql_as_comment: true
        emit_interface: true
        overrides:
          - db_type: "pg_catalog.timestamp"
            go_type: "time.Time"